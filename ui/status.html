<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📍 Train Running Status</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
}

header {
  background: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: 50px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
}

input, button {
  padding: 12px;
  width: 100%;
  margin-top: 12px;
  border-radius: 8px;
  font-size: 16px;
}

button {
  background: #243b55;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 25px;
  font-size: 18px;
}

.card {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  font-weight: bold;
}

.live { color: green; }
.pending { color: orange; }
.arrived { color: gray; }
</style>
</head>

<body>

<header>📍 Train Running Status</header>

<div class="container">

  <input id="trainNo" placeholder="Enter Train Number">
  <input type="date" id="journeyDate">
  <button onclick="startTracking()">Check</button>

  <div class="result" id="result"></div>

</div>

<script>
let intervalId = null;

const today = new Date().toISOString().split("T")[0];
document.getElementById("journeyDate").value = today;

function startTracking() {

  const trainNo = document.getElementById("trainNo").value.trim().toUpperCase();
  let rawDate = document.getElementById("journeyDate").value || today;

  const journeyDate = new Date(rawDate).toISOString().split("T")[0];

  if (!trainNo) {
    alert("Please enter train number");
    return;
  }

  if (intervalId) clearInterval(intervalId);

  loadStatus(trainNo, journeyDate);

  if (journeyDate === today) {
    intervalId = setInterval(() => loadStatus(trainNo, journeyDate), 60000);
  }
}

function loadStatus(trainNo, journeyDate) {

  fetch(`http://127.0.0.1:8000/status/${trainNo}?journey_date=${journeyDate}`)
    .then(res => res.json())
    .then(data => {

      const result = document.getElementById("result");

      if (data.message) {
        result.innerHTML = `<p style="color:red;">${data.message}</p>`;
        return;
      }

      if (data.status === "Completed") {
        result.innerHTML = `
          <div class="card arrived"> Journey completed</div>
          <div class="card">📅 ${data.journey_date}</div>
        `;
        return;
      }

      if (data.status === "Yet to start") {
        result.innerHTML = `
          <div class="card pending">⏳ Journey not started yet</div>
          <div class="card">📅 ${data.journey_date}</div>
        `;
        return;
      }

      if (data.status === "Arrived") {
        result.innerHTML = `
          <div class="card arrived"> Arrived at destination</div>
        `;
        return;
      }

      result.innerHTML = `
        <div class="card live">🚆 LIVE</div>
        <div class="card">📍 Current Station: ${data.current_station}</div>
        <div class="card">➡ Next Station: ${data.next_station}</div>
        <div class="card">🕒 Scheduled Arrival: ${data.scheduled_arrival}</div>
        <div class="card">🚨 Delay: ${data.delay}</div>
      `;
    })
    .catch(() => {
      document.getElementById("result").innerHTML =
        "<p style='color:red;'>Unable to fetch running status.</p>";
    });
}
</script>

</body>
</html>
