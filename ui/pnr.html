<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎟️ PNR Status</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
}

header {
  background: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
}

input, button {
  padding: 12px;
  width: 100%;
  margin-top: 12px;
  border-radius: 8px;
  font-size: 16px;
}

button {
  background: #243b55;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

.card {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 12px;
  margin-top: 12px;
  font-weight: bold;
}

.chart-ready {
  background: #e8fff1;
  border-left: 6px solid green;
  color: #1b5e20;
}

.chart-wait {
  background: #fff9e6;
  border-left: 6px solid orange;
  color: #e65100;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  text-align: center;
}

th {
  background: #eee;
}

.status-confirmed { color: green; }
.status-cancelled { color: red; }
.status-waiting { color: orange; }
</style>
</head>

<body>

<header>🎟️ PNR Status</header>

<div class="container">

  <input id="pnr" placeholder="Enter PNR">
  <button onclick="checkPNR()">Check Status</button>

  <div id="result"></div>

</div>

<script>
async function checkPNR() {

  const pnr = document.getElementById("pnr").value.trim().toUpperCase();
  const result = document.getElementById("result");
  result.innerHTML = "";

  if (!pnr) {
    alert("Please enter PNR");
    return;
  }

  try {
    //  Fetch PNR details
    const pnrRes = await fetch(`https://train-ticket-booking-system-fastapi-kafka.onrender.com/pnr/${pnr}`);
    const data = await pnrRes.json();

    if (data.message === "Not found") {
      result.innerHTML = "<p style='color:red;'>No PNR data found</p>";
      return;
    }

    //  Fetch train details (to get origin departure time)
    const trainRes = await fetch(
  `https://train-ticket-booking-system-fastapi-kafka.onrender.com/train/${data.train_no}?journey_date=${data.journey_date}`
);
    const train = await trainRes.json();

    if (train.message) {
      result.innerHTML = `<p style="color:red;">${train.message}</p>`;
      return;
    }

    //  Calculate CHART PREPARATION TIME
    const origin = train.stops[0];
    const departure = origin.dep; // HH:MM
    const [hh, mm] = departure.split(":").map(Number);

    const journeyDate = new Date(data.journey_date);
    const departureTime = new Date(journeyDate);
    departureTime.setHours(hh, mm, 0, 0);

    // Chart prepared 2 hours before departure
    const chartTime = new Date(departureTime);
    chartTime.setHours(chartTime.getHours() - 2);

    const now = new Date();
    const chartPrepared = now >= chartTime;

    //  Chart Status Card
    const chartCard = `
      <div class="card ${chartPrepared ? "chart-ready" : "chart-wait"}">
        🚆 <b>Chart Status:</b><br>
        Origin Station: ${origin.station}<br>
        Departure Time: ${departure}<br>
        Chart Time: ${chartTime.toLocaleTimeString()}<br><br>
        ${chartPrepared
          ? " Chart Prepared – Coach & seat finalised"
          : " Chart not prepared yet"}
      </div>
    `;

    //  Passenger rows
    let passengerRows = data.passengers.map((p, i) => {
      let statusClass = "status-confirmed";
      if (data.status === "CANCELLED") statusClass = "status-cancelled";
      if (data.status === "WAITING") statusClass = "status-waiting";

      return `
        <tr>
          <td>${i + 1}</td>
          <td>${p.name}</td>
          <td>${p.age}</td>
          <td>${p.gender}</td>
          <td>${p.seat_no}</td>
          <td>${p.berth}</td>
          <td class="${statusClass}">${data.status}</td>
        </tr>
      `;
    }).join("");

    //  Final Render
    result.innerHTML = `
      <div class="card">📌 PNR: ${data.pnr}</div>
      <div class="card">🚆 Train: ${train.name} (${data.train_no})</div>
      <div class="card">🛤 Route: ${data.source} → ${data.destination}</div>
      <div class="card">📅 Journey Date: ${data.journey_date}</div>

      ${chartCard}

      <table>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Seat</th>
          <th>Berth</th>
          <th>Status</th>
        </tr>
        ${passengerRows}
      </table>
    `;
  }
  catch (err) {
    console.error(err);
    result.innerHTML = "<p style='color:red;'>Failed to load PNR status</p>";
  }
}
</script>

</body>
</html>
