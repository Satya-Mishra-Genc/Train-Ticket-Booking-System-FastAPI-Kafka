<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Train Ticket Booking</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(120deg, #141e30, #243b55);
}

header {
  background: #ffffff;
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  color: #243b55;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: #ffffff;
  border-radius: 14px;
  padding: 25px;
  margin-bottom: 25px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.18);
}

h3 {
  margin-top: 0;
  color: #243b55;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}

.primary {
  background: linear-gradient(to right, #00b09b, #96c93d);
  color: white;
}

.danger {
  background: linear-gradient(to right, #cb2d3e, #ef473a);
  color: white;
}

.secondary {
  background: #243b55;
  color: white;
}

button:hover {
  opacity: 0.9;
}

.ticket {
  border-left: 6px solid #00b09b;
  background: #f6fffb;
}

.ticket-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.status {
  background: #00b09b;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
}

.details {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.detail span {
  font-weight: bold;
  color: #243b55;
}

.seats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.seat {
  padding: 10px;
  border-radius: 8px;
  background: #243b55;
  color: white;
  font-size: 13px;
}
</style>
</head>

<body>

<header> Train Ticket Booking System</header>

<div class="container">

<!-- BOOKING -->
<div class="card">
<h3>Journey Details</h3>
<div class="grid">
  <input id="train" placeholder="Train Number">
  <input id="from" placeholder="From">
  <input id="to" placeholder="To">
  <input type="date" id="date">
</div>
<br>

<h3>Seat Availability</h3>
<button class="secondary" onclick="loadAvailability()">Check Availability</button>
<div id="seatBox" class="seats"></div>
</div>

<!-- PASSENGERS -->
<div class="card">
<h3>Passenger Details (Multi‑Passenger)</h3>

<div id="passengers"></div>

<button class="secondary" onclick="addPassenger()"> Add Passenger</button>
<br><br>
<button class="primary" onclick="bookTickets()"> Confirm Ticket</button>
</div>

<!-- CONFIRMED TICKETS -->
<div id="tickets"></div>

</div>

<script>
let passengerCount = 0;

function addPassenger() {
  passengerCount++;
  passengers.innerHTML += `
    <div class="grid">
      <input id="pname${passengerCount}" placeholder="Passenger Name">
      <select id="seat${passengerCount}">
        <option>Sleeper</option>
        <option>3A</option>
        <option>2A</option>
        <option>1A</option>
        <option>General</option>
      </select>
    </div><br>
  `;
}

addPassenger();

function loadAvailability() {
  fetch(`http://127.0.0.1:8000/availability/${train.value}`)
  .then(r => r.json())
  .then(data => {
    seatBox.innerHTML = "";
    for (let k in data) {
      seatBox.innerHTML += `<div class="seat">${k}: ${data[k]} seats</div>`;
    }
  });
}

function bookTickets() {
  tickets.innerHTML = "";

  for (let i = 1; i <= passengerCount; i++) {
    const name = document.getElementById(`pname${i}`).value;
    const seat = document.getElementById(`seat${i}`).value;

    fetch(
      `http://127.0.0.1:8000/book-ticket?passenger_name=${name}` +
      `&train_no=${train.value}&seat_class=${seat}` +
      `&source=${from.value}&destination=${to.value}` +
      `&journey_date=${date.value}`,
      { method: "POST" }
    )
    .then(r => r.json())
    .then(showTicket);
  }
}

function showTicket(data) {
  if (data.status === "FAILED") {
    alert(data.reason);
    return;
  }

  tickets.innerHTML += `
  <div class="card ticket">
    <div class="ticket-header">
      <h3> Ticket Confirmed</h3>
      <div class="status">CONFIRMED</div>
    </div>

    <div class="details">
      <div class="detail"><span>PNR:</span> ${data.pnr}</div>
      <div class="detail"><span>Name:</span> ${data.passenger_name}</div>
      <div class="detail"><span>Train:</span> ${data.train_no}</div>
      <div class="detail"><span>Route:</span> ${data.from} → ${data.to}</div>
      <div class="detail"><span>Date:</span> ${data.journey_date}</div>
      <div class="detail"><span>Seat:</span> ${data.seat_no}</div>
    </div>

    <br>
    <button class="secondary" onclick="updatePassenger('${data.pnr}')">Update</button>
    <button class="danger" onclick="cancelTicket('${data.pnr}')"> Cancel</button>
  </div>`;
}

function cancelTicket(pnr) {
  fetch(`http://127.0.0.1:8000/ticket/${pnr}`, { method: "DELETE" })
  .then(() => alert("Ticket Cancelled"));
}

function updatePassenger(pnr) {
  const newName = prompt("Enter new passenger name:");
  if (!newName) return;

  fetch(`http://127.0.0.1:8000/ticket/${pnr}?passenger_name=${newName}`, {
    method: "PUT"
  })
  .then(() => alert("Passenger Updated"));
}
</script>

</body>
</html>
