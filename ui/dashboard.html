<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IRCTC Dashboard</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
  overflow: hidden;
}

/* ANIMATED BACKGROUND */
.bg-train {
  position: absolute;
  bottom: 40px;
  width: 200%;
  height: 120px;
  background: repeating-linear-gradient(
    90deg,
    #ffffff20 0px,
    #ffffff20 40px,
    transparent 40px,
    transparent 80px
  );
  animation: moveTrain 28s linear infinite;
}

@keyframes moveTrain {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  padding: 18px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
  font-weight: bold;
  color: #243b55;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

header button {
  background: linear-gradient(135deg, #cb2d3e, #ef473a);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: transform 0.2s, box-shadow 0.2s;
}

header button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 10;
  max-width: 1150px;
  margin: 60px auto;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

/* GLASS CARDS */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(14px);
  border-radius: 18px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
  color: white;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, #ffffff30, transparent);
  transform: translateX(-100%);
  transition: 0.6s;
}

.card:hover::before {
  transform: translateX(100%);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

/* ICON */
.icon {
  font-size: 42px;
  margin-bottom: 12px;
}

/* TITLE */
.title {
  font-size: 18px;
  font-weight: bold;
}

/* SUBTITLE */
.subtitle {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 6px;
}

.web-checkin-btn {
  margin-left: 10px;
  background: linear-gradient(135deg, #00b09b, #96c93d);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
}

.web-checkin-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- Animated background -->
<div class="bg-train"></div>

<header>
  🚆 IRCTC Dashboard

  
<button class="web-checkin-btn" onclick="go('web-checkin.html')">
      ✅ Web Check‑in
    </button>

  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="grid">

    <div class="card" onclick="go('booking.html')">
      <div class="icon">🎫</div>
      <div class="title">Book Tickets</div>
      <div class="subtitle">Reserve your journey</div>
    </div>

    <div class="card" onclick="go('schedule.html')">
      <div class="icon">📅</div>
      <div class="title">Train Schedule</div>
      <div class="subtitle">Check timings</div>
    </div>

    <div class="card" onclick="go('availability.html')">
      <div class="icon">🪑</div>
      <div class="title">Seat Availability</div>
      <div class="subtitle">Check seat availability</div>
    </div>

    <div class="card" onclick="go('status.html')">
      <div class="icon">📍</div>
      <div class="title">Running Status</div>
      <div class="subtitle">Live train location</div>
    </div>

    <div class="card" onclick="go('pnr.html')">
      <div class="icon">🎟️</div>
      <div class="title">PNR Status</div>
      <div class="subtitle">Check ticket status</div>
    </div>

    <div class="card" onclick="go('booking-history.html')">
      <div class="icon">📄</div>
      <div class="title">Booking History</div>
      <div class="subtitle">View past bookings</div>
    </div>

</div>

  </div>

</div>

<script>
function go(page) {
  window.location = page;
}

function logout() {
  localStorage.clear();
  window.location = "login.html";
}
</script>

</body>
</html>
